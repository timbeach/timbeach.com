<!DOCTYPE html>
<html>
<head>
    <title>Penguin Emoji Favicon Generator</title>
</head>
<body>
    <h2>Penguin Emoji Favicon Generator</h2>

    <div style="margin: 20px 0;">
        <h3>32x32 favicon:</h3>
        <canvas id="favicon32" width="32" height="32" style="border: 1px solid #ccc; image-rendering: pixelated; width: 128px; height: 128px;"></canvas>
        <br>
        <a id="download32" download="penguin-favicon-32.png">Download 32x32 PNG</a>
    </div>

    <div style="margin: 20px 0;">
        <h3>16x16 favicon:</h3>
        <canvas id="favicon16" width="16" height="16" style="border: 1px solid #ccc; image-rendering: pixelated; width: 128px; height: 128px;"></canvas>
        <br>
        <a id="download16" download="penguin-favicon-16.png">Download 16x16 PNG</a>
    </div>

    <script>
        function createEmojiCanvas(canvas, size) {
            const ctx = canvas.getContext('2d');

            // Clear canvas with transparent background
            ctx.clearRect(0, 0, size, size);

            // Set font size to fill most of the canvas
            const fontSize = Math.floor(size * 0.8);
            ctx.font = `${fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Draw the penguin emoji
            ctx.fillText('🐧', size/2, size/2);
        }

        // Create 32x32 favicon
        const canvas32 = document.getElementById('favicon32');
        createEmojiCanvas(canvas32, 32);
        canvas32.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            document.getElementById('download32').href = url;
        });

        // Create 16x16 favicon
        const canvas16 = document.getElementById('favicon16');
        createEmojiCanvas(canvas16, 16);
        canvas16.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            document.getElementById('download16').href = url;
        });
    </script>
</body>
</html>
